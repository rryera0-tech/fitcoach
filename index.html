    function usePersist(key, defaultValue) {
      const [state, setState] = useState(() => {
        try {
          const saved = localStorage.getItem(key);
          return saved !== null ? JSON.parse(saved) : defaultValue;
        } catch { return defaultValue; }
      });
      useEffect(() => {
        try { localStorage.setItem(key, JSON.stringify(state)); } catch {}
      }, [key, state]);
      return [state, setState];

      const styles = {

    // SECCIÓN: PERFIL
    // ═══════════════════════════════════════════════════════════════════════════════
    const ProfileSection = ({ profile, setProfile }) => {
      const [form, setForm] = useState(profile);
      const [saved, setSaved] = useState(false);

      const bmr = () => {
        if (!form.peso || !form.altura || !form.edad) return null;
        const base = form.sexo === "hombre"
          ? 10 * form.peso + 6.25 * form.altura - 5 * form.edad + 5
          : 10 * form.peso + 6.25 * form.altura - 5 * form.edad - 161;
        const factor = { sedentario: 1.2, ligero: 1.375, moderado: 1.55, activo: 1.725 }[form.actividad] || 1.2;
        return Math.round(base * factor);
      };

      const imc = () => {
        if (!form.peso || !form.altura) return null;
        return (form.peso / Math.pow(form.altura / 100, 2)).toFixed(1);
      };

      const imcLabel = () => {
        const v = parseFloat(imc());
        if (v < 18.5) return { t: "Bajo peso", c: "#60a5fa" };
        if (v < 25) return { t: "Normal ✓", c: COLORS.accent };
        if (v < 30) return { t: "Sobrepeso", c: COLORS.gold };
        return { t: "Obesidad", c: COLORS.danger };
      };

      const save = () => {
        setProfile(form);
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };

      const resetAll = () => {
        if (!window.confirm("¿Borrar todos tus datos guardados? Esta acción no se puede deshacer.")) return;
        localStorage.clear();
        window.location.reload();
      };

      const field = (label, key, type = "number", opts = {}) => (
        <div style={{ marginBottom: 14 }}>
          <label style={{ display: "block", fontSize: 12, color: COLORS.muted, marginBottom: 4 }}>{label}</label>
          {opts.options ? (
            <select value={form[key] || ""} onChange={e => setForm({ ...form, [key]: e.target.value })}
              style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14 }}>
              {opts.options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          ) : (
            <input type={type} value={form[key] || ""} onChange={e => setForm({ ...form, [key]: type === "number" ? parseFloat(e.target.value) || "" : e.target.value })}
              placeholder={opts.placeholder || ""}
              style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14, boxSizing: "border-box" }} />
          )}
        </div>
      );

      return (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>

            <h3 style={{ color: COLORS.accent, margin: "0 0 16px", fontSize: 16 }}>👤 Tus datos</h3>
            {field("Nombre", "nombre", "text", { placeholder: "¿Cómo te llamas?" })}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <div>{field("Peso (kg)", "peso")}</div>
              <div>{field("Altura (cm)", "altura")}</div>
              <div>{field("Edad", "edad")}</div>
              <div>{field("Sexo", "sexo", "text", { options: [{ v: "hombre", l: "Hombre" }, { v: "mujer", l: "Mujer" }] })}</div>
            </div>
            {field("Actividad física", "actividad", "text", {
              options: [
                { v: "sedentario", l: "Sedentario (sin ejercicio)" },
                { v: "ligero", l: "Ligero (1-2 días/semana)" },
                { v: "moderado", l: "Moderado (3-5 días/semana)" },
                { v: "activo", l: "Muy activo (6-7 días/semana)" },
              ]
            })}
            {field("Objetivo", "objetivo", "text", {
              options: [
                { v: "perder", l: "🔥 Perder peso" },
                { v: "mantener", l: "⚖️ Mantener peso" },
                { v: "ganar", l: "💪 Ganar músculo" },
              ]
            })}
            <Btn onClick={save} style={{ width: "100%", marginTop: 4 }}>
              {saved ? "✅ ¡Guardado!" : "Guardar perfil"}
            </Btn>
            <button onClick={resetAll}
              style={{ width: "100%", marginTop: 8, padding: "8px", background: "none", border: `1px solid ${COLORS.danger}33`, borderRadius: 8, color: COLORS.danger, fontSize: 12, cursor: "pointer", opacity: 0.7 }}>
              🗑️ Borrar todos mis datos
            </button>
          </Card>

          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {bmr() && (
              <Card glow>
                <div style={{ fontSize: 12, color: COLORS.muted, marginBottom: 6 }}>🔥 Calorías de mantenimiento</div>
                <div style={{ fontSize: 36, fontWeight: 900, color: COLORS.accent, lineHeight: 1 }}>{bmr()}</div>
                <div style={{ fontSize: 12, color: COLORS.muted, marginTop: 4 }}>kcal / día</div>
              </Card>
            )}
            {bmr() && (
              <Card>
                <div style={{ fontSize: 12, color: COLORS.muted, marginBottom: 6 }}>🎯 Meta calórica para tu objetivo</div>
                <div style={{ fontSize: 30, fontWeight: 900, color: COLORS.gold }}>
                  {form.objetivo === "perder" ? bmr() - 300 : form.objetivo === "ganar" ? bmr() + 300 : bmr()}
                </div>
                <div style={{ fontSize: 12, color: COLORS.muted, marginTop: 4 }}>kcal / día recomendadas</div>
              </Card>
            )}
            {imc() && (
              <Card>
                <div style={{ fontSize: 12, color: COLORS.muted, marginBottom: 6 }}>📊 IMC (Índice de Masa Corporal)</div>
                <div style={{ fontSize: 36, fontWeight: 900, color: imcLabel().c }}>{imc()}</div>
                <div style={{ fontSize: 13, color: imcLabel().c, marginTop: 4 }}>{imcLabel().t}</div>
              </Card>
            )}
          </div>
        </div>
      );
    };

    // ═══════════════════════════════════════════════════════════════════════════════
    // SECCIÓN: CALORÍAS (Buscador integrado + Reconocimiento de Fotos)
    // ═══════════════════════════════════════════════════════════════════════════════
    const CaloriesSection = ({ profile, apiKey }) => {
      const [logData, setLogData] = usePersist("fc_food_log", { date: todayKey(), items: [] });
      const log = logData.date === todayKey() ? logData.items : [];
      const setLog = (items) => setLogData({ date: todayKey(), items: typeof items === "function" ? items(log) : items });

      const [search, setSearch]     = useState("");
      const [selected, setSelected] = useState(null);
      const [grams, setGrams]       = useState(100);
      const [meal, setMeal]         = useState("Desayuno");
      const [catFilter, setCatFilter] = useState("Todos");
      
      // Estados para la foto
      const [imageLoading, setImageLoading] = useState(false);
      const [photoPreview, setPhotoPreview] = useState(null);
      const fileInputRef = useRef(null);

      const meta = (() => {
        if (!profile.peso || !profile.altura || !profile.edad) return 2000;
        const base = profile.sexo === "hombre" ? 10 * profile.peso + 6.25 * profile.altura - 5 * profile.edad + 5 : 10 * profile.peso + 6.25 * profile.altura - 5 * profile.edad - 161;
        const factor = { sedentario: 1.2, ligero: 1.375, moderado: 1.55, activo: 1.725 }[profile.actividad] || 1.2;
        const bmr = Math.round(base * factor);
        return profile.objetivo === "perder" ? bmr - 300 : profile.objetivo === "ganar" ? bmr + 300 : bmr;
      })();

      const metaProt = profile.peso ? Math.round(profile.peso * (profile.objetivo === "ganar" ? 2.2 : 1.8)) : 150;
      const metaCarb = Math.round((meta * 0.40) / 4);
      const metaFat  = Math.round((meta * 0.25) / 9);

      const totalCal  = Math.round(log.reduce((s, e) => s + e.cal,  0));
      const totalProt = Math.round(log.reduce((s, e) => s + (e.prot * (e.grams || 100) / 100), 0));
      const totalCarb = Math.round(log.reduce((s, e) => s + (e.carb * (e.grams || 100) / 100), 0));
      const totalFat  = Math.round(log.reduce((s, e) => s + (e.fat  * (e.grams || 100) / 100), 0));

      const categories = ["Todos", ...Array.from(new Set(FOODS.map(f => f.cat)))];
      const filtered = FOODS.filter(f => f.name.toLowerCase().includes(search.toLowerCase()) && (catFilter === "Todos" || f.cat === catFilter));

      const addFood = () => {
        if (!selected) return;
        const ratio = grams / 100;
        setLog([...log, {
          ...selected, grams,
          cal:  Math.round(selected.cal  * ratio),
          prot: selected.prot * ratio,
          carb: selected.carb * ratio,
          fat:  selected.fat  * ratio,
          meal, id: Date.now()
        }]);
        setSelected(null); setSearch(""); setGrams(100); setPhotoPreview(null);
      };

      // Función para procesar comida por Foto usando Gemini 1.5 Flash
      const handlePhotoUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Mostrar Preview visual
        const reader = new FileReader();
        reader.onloadend = () => setPhotoPreview(reader.result);
        reader.readAsDataURL(file);

        if (!apiKey) {
          alert("Por favor introduce tu API Key de Gemini en la pestaña de Configuración.");
          return;
        }

        setImageLoading(true);

        try {
          const base64Data = await new Promise((resolve) => {
            const r = new FileReader();
            r.onload = () => resolve(r.result.split(',')[1]);
            r.readAsDataURL(file);
          });

          const promptVisual = "Analiza detalladamente este plato de comida. Estima el alimento principal o conjunto, calcula los gramos visuales aproximados y devuélveme un objeto JSON exacto, sin textos adicionales ni bloques adicionales, siguiendo esta estructura exacta: {\"name\": \"Nombre estimado del plato\", \"cal\": 150, \"prot\": 12, \"carb\": 20, \"fat\": 5, \"unit\": \"g\", \"cat\": \"📸 Foto\"}. Nota: cal, prot, carb, fat deben ser valores calculados directamente para la porción estimada completa de la foto por cada 100g de base estándar.";

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [
                  { text: promptVisual },
                  { inlineData: { mimeType: file.type, data: base64Data } }
                ]
              }]
            })
          });

          const resData = await response.json();
          const txt = resData.candidates[0].content.parts[0].text.trim().replace(/```json/g, "").replace(/```/g, "");
          const analizado = JSON.parse(txt);

          setSelected(analizado);
          setSearch(analizado.name);
          setGrams(100);

        } catch (err) {
          console.error(err);
          alert("Error analizando la imagen. Comprueba tu conexión o API Key.");
        } finally {
          setImageLoading(false);
        }
      };

      const MacroBar = ({ label, val, meta: mx, color }) => (
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: COLORS.muted, marginBottom: 3 }}>
            <span style={{ fontWeight: 700, color }}>{label}</span>
            <span>{val}g</span>
          </div>
          <div style={{ background: "#1a2a1e", borderRadius: 99, height: 5 }}>
            <div style={{ width: `${Math.min((val / mx) * 100, 100)}%`, height: "100%", background: color, borderRadius: 99, transition: "width 0.5s ease" }} />
          </div>
          <div style={{ fontSize: 10, color: COLORS.muted, marginTop: 2, textAlign: "right" }}>/{mx}g</div>
        </div>
      );

      return (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Card glow>
              <div style={{ display: 'flex', justifyBetween: 'space-between', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                <h3 style={{ color: COLORS.accent, fontSize: 16 }}>🔍 Buscar Alimento o Foto</h3>
                <input type="file" accept="image/*" ref={fileInputRef} onChange={handlePhotoUpload} style={{ display: 'none' }} />
                <Btn variant="ghost" onClick={() => fileInputRef.current.click()} style={{ padding: '6px 12px', fontSize: 12 }}>
                  📷 Escanear Plato
                </Btn>
              </div>

              {photoPreview && (
                <div style={{ textAlign: 'center', marginBottom: 12, background: '#111814', borderRadius: 8, padding: 8 }}>
                  <img src={photoPreview} style={{ maxHeight: 120, borderRadius: 6, maxWidth: '100%' }} alt="Preview" />
                  {imageLoading && <div style={{ fontSize: 12, color: COLORS.gold, marginTop: 4 }}>Analizando macronutrientes...</div>}
                </div>
              )}

              <input value={search} onChange={e => { setSearch(e.target.value); setSelected(null); }} placeholder="Escribe un alimento... (ej: pollo, avena)"
                style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14, marginBottom: 8, boxSizing: "border-box" }} />

              <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 10 }}>
                {categories.slice(0, 8).map(c => (
                  <button key={c} onClick={() => setCatFilter(c)}
                    style={{ padding: "3px 9px", borderRadius: 99, border: `1px solid ${catFilter === c ? COLORS.accent : "#2a3e2e"}`, background: catFilter === c ? COLORS.accentDim : "transparent", color: catFilter === c ? COLORS.accent : COLORS.muted, fontSize: 11, cursor: "pointer" }}>
                    {c}
                  </button>
                ))}
              </div>

              {!selected && (
                <div style={{ background: "#1a2a1e", borderRadius: 8, maxHeight: 160, overflowY: "auto", border: `1px solid #2a3e2e` }}>
                  {filtered.slice(0, 8).map(f => (
                    <div key={f.name} onClick={() => { setSelected(f); setSearch(f.name); }}
                      style={{ padding: "8px 12px", cursor: "pointer", borderBottom: "1px solid #1e2e22", fontSize: 13, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <span style={{ color: COLORS.text }}>{f.name}</span>
                        <span style={{ fontSize: 10, color: COLORS.muted, marginLeft: 6 }}>{f.cat}</span>
                      </div>
                      <span style={{ color: COLORS.accent, fontWeight: 700, fontSize: 12 }}>{f.cal} kcal</span>
                    </div>
                  ))}
                </div>
              )}

              {selected && (
                <div style={{ background: COLORS.accentDim, borderRadius: 10, padding: 12, marginBottom: 10, border: `1px solid ${COLORS.accent}33` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <div>
                      <div style={{ color: COLORS.accent, fontWeight: 700, fontSize: 14 }}>{selected.name}</div>
                      <div style={{ color: COLORS.muted, fontSize: 11 }}>{selected.cat} · por 100{selected.unit || "g"}</div>
                    </div>
                    <button onClick={() => { setSelected(null); setSearch(""); setPhotoPreview(null); }} style={{ background: "none", border: "none", color: COLORS.muted, cursor: "pointer", fontSize: 16 }}>✕</button>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, marginBottom: 10 }}>
                    {[
                      { l: "Kcal", v: selected.cal, c: COLORS.accent },
                      { l: "Prot", v: `${Math.round(selected.prot)}g`, c: "#60a5fa" },
                      { l: "Carbs", v: `${Math.round(selected.carb)}g`, c: COLORS.gold },
                      { l: "Grasa", v: `${Math.round(selected.fat)}g`, c: "#f97316" },
                    ].map(x => (
                      <div key={x.l} style={{ background: "#0f1e12", borderRadius: 6, padding: "6px 4px", textAlign: "center" }}>
                        <div style={{ fontSize: 14, fontWeight: 900, color: x.c }}>{x.v}</div>
                        <div style={{ fontSize: 9, color: COLORS.muted }}>{x.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                <div>
                  <label style={{ fontSize: 12, color: COLORS.muted, display: "block", marginBottom: 4 }}>Cantidad ({selected?.unit || "g"})</label>
                  <input type="number" value={grams} onChange={e => setGrams(parseFloat(e.target.value) || 0)}
                    style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14, boxSizing: "border-box" }} />
                </div>
                <div>
                  <label style={{ fontSize: 12, color: COLORS.muted, display: "block", marginBottom: 4 }}>Comida</label>
                  <select value={meal} onChange={e => setMeal(e.target.value)}
                    style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14 }}>
                    {["Desayuno", "Almuerzo", "Merienda", "Cena"].map(m => <option key={m}>{m}</option>)}
                  </select>
                </div>
              </div>
              <Btn onClick={addFood} disabled={!selected || imageLoading} style={{ width: "100%" }}>➕ Añadir al diario</Btn>
            </Card>

            <Card>
              <h4 style={{ color: COLORS.accent, margin: "0 0 12px", fontSize: 14 }}>📊 Macros del día</h4>
              <ProgressBar value={totalCal} max={meta} label="Calorías totales" />
              <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                <MacroBar label="Proteína" val={totalProt} meta={metaProt} color="#60a5fa" />
                <MacroBar label="Carbos"   val={totalCarb} meta={metaCarb} color={COLORS.gold} />
                <MacroBar label="Grasa"    val={totalFat}  meta={metaFat}  color="#f97316" />
              </div>
            </Card>
          </div>

          <Card>
            <h3 style={{ color: COLORS.accent, margin: "0 0 14px", fontSize: 16 }}>📋 Diario de hoy</h3>
            {log.length === 0 ? (
              <div style={{ color: COLORS.muted, textAlign: "center", padding: "40px 20px", fontSize: 13 }}>
                <div style={{ fontSize: 36, marginBottom: 8 }}>🍽️</div>
                Añade alimentos para ver el desglose diario.
              </div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10, maxHeight: 340, overflowY: 'auto' }}>
                {log.map(item => (
                  <div key={item.id} style={{ display: 'flex', justifyBetween: 'space-between', justifyContent: 'space-between', alignItems: 'center', background: '#1a2a1e', padding: 10, borderRadius: 8 }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 'bold' }}>{item.name}</div>
                      <div style={{ fontSize: 11, color: COLORS.muted }}>{item.meal} · {item.grams}{item.unit || "g"}</div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <span style={{ fontSize: 13, color: COLORS.accent, fontWeight: 'bold' }}>{item.cal} kcal</span>
                      <button onClick={() => setLog(log.filter(x => x.id !== item.id))} style={{ background: 'none', border: 'none', color: COLORS.danger, cursor: 'pointer' }}>🗑️</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>
      );
    };

    // ═══════════════════════════════════════════════════════════════════════════════
    // SECCIÓN: ENTRENAMIENTO (¡Formulario de Claude + Gemini Integrado Completo!)
    // ═══════════════════════════════════════════════════════════════════════════════
    const WorkoutSection = ({ profile, apiKey }) => {
      const [config, setConfig] = usePersist("fc_workout_config", {
        fisicas: "Complexión media, sin lesiones",
        tiempo: "3 días a la semana, 45 min por sesión",
        lugar: "Gimnasio"
      });
      const [plan, setPlan] = usePersist("fc_workout_plan", null);
      const [loading, setLoading] = useState(false);

      const generarPlan = async () => {
        if (!apiKey) {
          alert("Por favor añade tu clave API de Gemini en la pestaña Configuración.");
          return;
        }
        setLoading(true);
        
        const promptText = `Actúa como un entrenador personal de élite. Genera un plan de entrenamiento semanal estructurado exactamente con estas especificaciones:
        - Características Físicas: ${config.fisicas} (Edad: ${profile.edad || '32'} años, Peso: ${profile.peso || '75'}kg, Objetivo principal: ${profile.objetivo || 'Ganar músculo'}).
        - Disponibilidad de Tiempo: ${config.tiempo}.
        - Lugar de ejecución: ${config.lugar} (Casa o Gimnasio).

        Devuelve la respuesta EXCLUSIVAMENTE en un formato JSON estructurado, sin bloques literales adicionales, siguiendo este molde:
        {
          "progreso": "Enfoque general basado en tus características y espacio.",
          "rutina": [
            { "dia": "Día 1", "enfoque": "Pecho y Brazos", "ejercicios": ["Press Banca - 4x10", "Flexiones intensas - 3x12"] }
          ]
        }`;

        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
          });
          const resData = await response.json();
          const txt = resData.candidates[0].content.parts[0].text.trim().replace(/```json/g, "").replace(/```/g, "");
          const planParseado = JSON.parse(txt);
          setPlan(planParseado);
        } catch (err) {
          console.error(err);
          alert("Error generando la rutina personalizada.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <Card glow>
            <h3 style={{ color: COLORS.accent, marginBottom: 14, fontSize: 16 }}>🏋️ Configurar Plan</h3>
            
            <div style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 12, color: COLORS.muted, display: 'block', marginBottom: 4 }}>Características Físicas / Historial</label>
              <textarea value={config.fisicas} onChange={e => setConfig({ ...config, fisicas: e.target.value })}
                style={{ width: '100%', padding: 10, background: '#1a2a1e', border: '1px solid #2a3e2e', borderRadius: 8, color: '#e8f5ec', height: 60, fontSize: 13, resize: 'none' }} />
            </div>

            <div style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 12, color: COLORS.muted, display: 'block', marginBottom: 4 }}>Disponibilidad Semanal</label>
              <input type="text" value={config.tiempo} onChange={e => setConfig({ ...config, tiempo: e.target.value })}
                style={{ width: '100%', padding: 10, background: '#1a2a1e', border: '1px solid #2a3e2e', borderRadius: 8, color: '#e8f5ec', fontSize: 13 }} />
            </div>

            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 12, color: COLORS.muted, display: 'block', marginBottom: 4 }}>¿Dónde vas a entrenar?</label>
              <select value={config.lugar} onChange={e => setConfig({ ...config, lugar: e.target.value })}
                style={{ width: '100%', padding: 10, background: '#1a2a1e', border: '1px solid #2a3e2e', borderRadius: 8, color: '#e8f5ec', fontSize: 13 }}>
                <option value="Gimnasio">🏋️ En el Gimnasio</option>
                <option value="Casa">🏡 En Casa (Sin material / Calistenia)</option>
              </select>
            </div>

            <Btn onClick={generarPlan} disabled={loading} style={{ width: '100%' }}>
              {loading ? 'Generando tu Rutina Inteligente...' : '🚀 Diseñar Rutina Personalizada'}
            </Btn>
          </Card>

          <Card>
            <h3 style={{ color: COLORS.accent, marginBottom: 12, fontSize: 16 }}>📋 Tu Rutina Semanal</h3>
            {!plan ? (
              <div style={{ color: COLORS.muted, padding: '40px 10px', textAlign: 'center', fontSize: 13 }}>
                Rellena tus parámetros de tiempo y lugar a la izquierda y presiona el botón para compilar tu plan con IA.
              </div>
            ) : (
              <div style={{ maxHeight: 360, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 12 }}>
                <div style={{ fontSize: 12, color: COLORS.gold, background: '#221a0f', padding: 8, borderRadius: 6 }}>
                  💡 {plan.progreso}
                </div>
                {plan.rutina.map((r, idx) => (
                  <div key={idx} style={{ background: '#1a2a1e', padding: 10, borderRadius: 8 }}>
                    <div style={{ display: 'flex', justifyBetween: 'space-between', justifyContent: 'space-between', fontSize: 13, borderBottom: '1px solid #2a3e2e', paddingBottom: 4, marginBottom: 6 }}>
                      <span style={{ color: COLORS.accent, fontWeight: 'bold' }}>{r.dia}</span>
                      <span style={{ color: COLORS.muted }}>{r.enfoque}</span>
                    </div>
                    <ul style={{ paddingLeft: 14, fontSize: 12, color: '#e8f5ec' }}>
                      {r.exercises ? r.exercises.map((e, i) => <li key={i}>{e}</li>) : r.ejercicios?.map((e, i) => <li key={i}>{e}</li>)}
                    </ul>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>
      );
    };

    // ═══════════════════════════════════════════════════════════════════════════════
    // SECCIÓN: CONFIGURACIÓN
    // ═══════════════════════════════════════════════════════════════════════════════
    const SettingsSection = ({ apiKey, setApiKey }) => {
      return (
        <Card glow style={{ maxWidth: 500, margin: '0 auto' }}>
          <h3 style={{ color: COLORS.accent, marginBottom: 12, fontSize: 16 }}>⚙️ Configuración del Sistema</h3>
          <p style={{ fontSize: 12, color: COLORS.muted, marginBottom: 14 }}>
            Para habilitar el creador de rutinas adaptadas y el escáner de fotos, necesitas enlazar tu API Key de Gemini.
          </p>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 12, color: COLORS.muted, marginBottom: 4 }}>Gemini API Key</label>
            <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="AIzaSy..."
              style={{ width: '100%', padding: '10px 12px', background: '#1a2a1e', border: '1px solid #2a3e2e', borderRadius: 8, color: '#e8f5ec', fontSize: 14 }} />
          </div>
          <div style={{ fontSize: 11, color: COLORS.gold }}>
            🔒 Tus claves e información se almacenan de manera local y nunca tocan servidores externos.
          </div>
        </Card>
      );
    };

    // ═══════════════════════════════════════════════════════════════════════════════
    // COMPONENTE PRINCIPAL (ROOT)
    // ═══════════════════════════════════════════════════════════════════════════════
    const App = () => {
      const [tab, setTab] = usePersist("fc_tab", "profile");
      const [profile, setProfile] = usePersist("fc_profile", { nombre: "", peso: "", altura: "", edad: "", sexo: "hombre", actividad: "moderado", objetivo: "mantener" });
      const [apiKey, setApiKey] = usePersist("fc_api_key", API_KEY_PLACEHOLDER);

      return (
        <div className="app-container">
          <div className="header">
            <div className="header-title">Fit<span>Coach</span> IA</div>
            <div style={{ fontSize: 12, color: COLORS.muted }}>Hola, {profile.nombre || 'Atleta'} 👋</div>
          </div>

          {tab === "profile" && <ProfileSection profile={profile} setProfile={setProfile} />}
          {tab === "calories" && <CaloriesSection profile={profile} apiKey={apiKey} />}
          {tab === "workout" && <WorkoutSection profile={profile} apiKey={apiKey} />}
          {tab === "settings" && <SettingsSection apiKey={apiKey} setApiKey={setApiKey} />}

          <div className="nav-bar bottom-safe">
            <button className={`nav-item ${tab === 'profile' ? 'active' : ''}`} onClick={() => setTab('profile')}>
              <span className="nav-icon">👤</span>Perfil
            </button>
            <button className={`nav-item ${tab === 'calories' ? 'active' : ''}`} onClick={() => setTab('calories')}>
              <span className="nav-icon">🍽️</span>Calorías
            </button>
            <button className={`nav-item ${tab === 'workout' ? 'active' : ''}`} onClick={() => setTab('workout')}>
              <span className="nav-icon">🏋️</span>Rutina
            </button>
            <button className={`nav-item ${tab === 'settings' ? 'active' : ''}`} onClick={() => setTab('settings')}>
              <span className="nav-icon">⚙️</span>Config
            </button>
          </div>
        </div>
      );
    };

    const root = RoyalDOM = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
